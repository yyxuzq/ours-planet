name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      -  name: Setup Java
         uses: actions/setup-java@v4
         with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare web directory
        run: |
          mkdir www
          cp index.html www/
          cp manifest.webmanifest www/
          cp sw.js www/
          cp *.jpg www/ 2>/dev/null || true
          cp *.png www/ 2>/dev/null || true
          cp *.svg www/ 2>/dev/null || true
          cp *.mp3 www/ 2>/dev/null || true
          cp *.css www/ 2>/dev/null || true

      - name: Install dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Setup Capacitor
        run: |
          npx cap init "茗茗的共栖星球" "com.xuyueming.ours" --web-dir www
          npx cap add android

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore ours-release.keystore -alias ours \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass ours123456 -keypass ours123456 \
            -dname "CN=茗茗, OU=共栖星球, O=OursPlanet, L=Unknown, ST=Unknown, C=CN"

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Debug APK (skip manual signing)
        uses: actions/upload-artifact@v4
        with:
          name: 共栖星球-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
