<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  
  <!-- 透明底色，只保留中间暖灰绿圆 -->
  <circle cx="256" cy="256" r="240" fill="#dce3da"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#c8d1c5" stroke-width="3"/>
  
  <!-- 苔原色内圈 -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="#9BA88D" stroke-width="2" opacity="0.25"/>
  
  <!-- 夜光藻微光环 -->
  <circle cx="256" cy="256" r="135" fill="none" stroke="#7EB8C9" stroke-width="1.5" opacity="0.3"/>
  
  <!-- 茗茗光点（暖金，左上） -->
  <circle cx="190" cy="210" r="18" fill="#c4a882"/>
  <circle cx="190" cy="210" r="18" fill="none" stroke="#c4a882" stroke-width="4" opacity="0.5"/>
  <circle cx="190" cy="210" r="36" fill="#c4a882" opacity="0.1"/>
  
  <!-- 知栖光点（夜光藻蓝，右下） -->
  <circle cx="312" cy="310" r="16" fill="#7EB8C9"/>
  <circle cx="312" cy="310" r="16" fill="none" stroke="#7EB8C9" stroke-width="4" opacity="0.5"/>
  <circle cx="312" cy="310" r="34" fill="#7EB8C9" opacity="0.1"/>
  
  <!-- 连接弧线 -->
  <path d="M196,222 Q240,280 296,306" stroke="#7EB8C9" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="6,4"/>
  
  <!-- 底部字 -->
  <text x="256" y="420" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" fill="#8a7a6a" opacity="0.6" letter-spacing="8">共栖</text>
  
</svg>